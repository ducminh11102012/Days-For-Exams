name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Install Qt via official prebuilt zip (stable)
      - name: Download Qt prebuilt
        run: |
          curl -L -o qt.zip https://download.qt.io/archive/qt/6.11/6.11.0/single/qt-everywhere-src-6.11.0.zip
          mkdir C:\Qt
          tar -xf qt.zip -C C:\Qt

      # ⚙️ Set env
      - name: Setup Qt PATH
        run: echo "C:\Qt\bin" >> $env:GITHUB_PATH

      # 🛠️ Configure
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDFE_ENABLE_QT_UI=ON

      # 🔨 Build
      - name: Build
        run: cmake --build build --config Release

      # 🚀 Deploy
      - name: Deploy Qt
        run: |
          cd build/Release
          windeployqt *.exe

      # 📦 Upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dfe-build
          path: build/Release/
