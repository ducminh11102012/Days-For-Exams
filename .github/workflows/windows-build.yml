name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🐍 Setup Python (fix aqt bug)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 Install aqt (version ổn định)
      - name: Install aqt
        run: pip install aqtinstall==3.1.6

      # 🔥 Install Qt (manual, không bug)
      - name: Install Qt
        run: |
          python -m aqt install-qt windows desktop 6.6.3 win64_msvc2022_64 -O C:/Qt

      # ⚙️ Add Qt vào PATH
      - name: Setup Qt Env
        run: |
          echo "C:/Qt/6.6.3/msvc2022_64/bin" >> $env:GITHUB_PATH

      # 🛠️ Configure
      - name: Configure (CMake)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDFE_ENABLE_QT_UI=ON

      # 🔨 Build
      - name: Build (Release)
        run: cmake --build build --config Release

      # 🚀 Deploy Qt
      - name: Deploy Qt
        run: |
          cd build/Release
          windeployqt *.exe

      # 📦 Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfe-windows-build
          path: build/Release/
