name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 Fix Qt install (stable version)
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtdeclarative'

      # 🛠️ Configure
      - name: Configure (CMake)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDFE_ENABLE_QT_UI=ON

      # 🔨 Build
      - name: Build (Release)
        run: cmake --build build --config Release

      # 🧪 Test (optional nhưng cứ để)
      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      # 🚀 Deploy Qt (VERY IMPORTANT)
      - name: Deploy Qt
        run: |
          cd build/Release
          windeployqt *.exe

      # 📦 Upload exe + dll đầy đủ
      - name: Upload artifact (.exe + deps)
        uses: actions/upload-artifact@v4
        with:
          name: dfe-windows-build
          path: build/Release/
