name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # ⚡ Download Qt Online Installer
      # =========================
      - name: Download Qt Installer
        run: |
          curl -L -o qt-online.exe https://d13lb3tujbc8s0.cloudfront.net/onlineinstallers/qt-online-installer-windows-x64-4.11.0.exe

      # =========================
      # ⚡ Install Qt (SILENT FIXED)
      # =========================
      - name: Install Qt (silent)
        shell: powershell
        run: |
          Start-Process -FilePath ".\qt-online.exe" -ArgumentList @(
            "--root", "C:\Qt",
            "--silent",
            "--accept-licenses",
            "--default-answer",
            "--confirm-command",
            "install",
            "qt.qt6.6110.win64_msvc2022_64"
          ) -Wait

      # =========================
      # ⚙️ Setup Qt PATH
      # =========================
      - name: Set Qt PATH
        run: echo "C:\Qt\6.11.0\msvc2022_64\bin" >> $env:GITHUB_PATH

      # =========================
      # 🧠 Setup MSVC
      # =========================
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # =========================
      # 🛠 Configure
      # =========================
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDFE_ENABLE_QT_UI=ON

      # =========================
      # 🔨 Build
      # =========================
      - name: Build
        run: cmake --build build --config Release

      # =========================
      # 🚀 Deploy Qt DLLs
      # =========================
      - name: Deploy Qt
        run: |
          cd build/Release
          windeployqt.exe dfe.exe

      # =========================
      # 📦 Upload
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfe-windows-exe
          path: build/Release/
