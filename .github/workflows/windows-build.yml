name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Qt prebuilt
        run: |
          curl -L -o qt-online.exe https://d13lb3tujbc8s0.cloudfront.net/onlineinstallers/qt-online-installer-windows-x64-4.11.0.exe
          start /wait qt-online.exe --silent --platform minimal --verbose --root C:\Qt --add Qt/6.11.0/msvc2022_64

      - name: Add Qt to PATH
        run: echo "C:\Qt\6.11.0\msvc2022_64\bin" >> $env:GITHUB_PATH

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDFE_ENABLE_QT_UI=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy
        run: |
          cd build/Release
          windeployqt *.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dfe-build
          path: build/Release/
