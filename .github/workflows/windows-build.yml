name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🐍 Python (required for aqt)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 Install aqt stable
      - name: Install aqtinstall
        run: pip install aqtinstall==3.1.6

      # ⚡ Install Qt PREBUILT (NOT SOURCE)
      - name: Install Qt (binary)
        run: |
          python -m aqt install-qt windows desktop 6.6.3 win64_msvc2022_64 -O C:\Qt

      # ⚙️ Setup Qt env
      - name: Setup Qt PATH
        run: echo "C:\Qt\6.6.3\msvc2022_64\bin" >> $env:GITHUB_PATH

      # 🛠️ Configure CMake
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDFE_ENABLE_QT_UI=ON

      # 🔨 Build
      - name: Build
        run: cmake --build build --config Release

      # 🚀 Deploy Qt runtime
      - name: Deploy Qt
        run: |
          cd build/Release
          windeployqt *.exe

      # 📦 Upload artifact
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dfe-build
          path: build/Release/
